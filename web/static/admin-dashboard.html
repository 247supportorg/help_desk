<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactoryX Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="ambient"></div>
  <main class="shell admin-shell">
    <header class="panel admin-header reveal">
      <div>
        <p class="eyebrow">FactoryX Admin</p>
        <h1>Ticket Overview</h1>
        <p class="subtext">View current tickets, update workflow state, and follow the latest support activity.</p>
      </div>
      <div class="admin-actions">
        <button id="logout-button" class="secondary-button" type="button">Logout</button>
      </div>
    </header>

    <section class="grid admin-grid">
      <article class="panel reveal delay-1">
        <h2>Session</h2>
        <p id="admin-email" class="meta">Checking sign-in status...</p>
        <p id="admin-status" class="message"></p>
      </article>

      <article class="panel reveal delay-2">
        <h2>Ticket Stats</h2>
        <div class="stats admin-stats" id="admin-stats"></div>
      </article>
    </section>

    <section class="panel reveal delay-3">
      <div class="row">
        <h2>Tickets</h2>
        <select id="admin-status-filter" title="Filter tickets by status">
          <option value="">All statuses</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div id="admin-tickets" class="tickets admin-tickets"></div>
    </section>

    <section class="panel reveal delay-3" id="admin-actions-section">
      <h2>Administrator Actions</h2>
      <p class="meta">These tools are only visible to signed-in administrators.</p>

      <h3 class="admin-subhead">Update Ticket</h3>
      <form id="admin-update-ticket-form" class="split">
        <label>
          Ticket ID
          <input type="number" name="ticketId" min="1" required placeholder="1" />
        </label>
        <label>
          Assignees
          <input type="text" name="assignees" list="admin-update-assignees-datalist" placeholder="admin@example.com" autocomplete="off" />
          <datalist id="admin-update-assignees-datalist"></datalist>
        </label>
        <label>
          Status
          <select name="status">
            <option value="">No change</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </label>
        <label>
          Resolution Notes
          <input type="text" name="resolution" placeholder="Root cause and fix summary" />
        </label>
        <button type="submit">Apply Update</button>
        <p id="admin-update-message" class="message"></p>
      </form>

      <hr />

      <h3 class="admin-subhead">Add Comment</h3>
      <form id="admin-comment-form" class="split">
        <label>
          Ticket ID
          <input type="number" name="ticketId" min="1" required placeholder="1" />
        </label>
        <label>
          Author
          <input type="text" name="author" required placeholder="admin@example.com" />
        </label>
        <label class="wide">
          Message
          <input type="text" name="message" required placeholder="Investigating logs and firewall policies" />
        </label>
        <label class="inline">
          <input type="checkbox" name="internal" /> Internal note
        </label>
        <button type="submit">Post Comment</button>
        <p id="admin-comment-message" class="message"></p>
      </form>
    </section>
  </main>

  <script src="/admin-dashboard.js"></script>
</body>
</html>
