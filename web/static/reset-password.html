<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactoryX Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="ambient"></div>
  <main class="shell auth-shell">
    <section class="panel auth-panel reveal">
      <p class="eyebrow">FactoryX Admin</p>
      <h1>Set a new password</h1>
      <p class="subtext" id="reset-subtext">Use the token from your reset email to set a new admin password.</p>

      <form id="reset-password-form" class="stack auth-form" hidden>
        <label>
          New Password
          <input type="password" name="newPassword" required minlength="8" placeholder="Minimum 8 characters" autocomplete="new-password" />
        </label>
        <label>
          Confirm Password
          <input type="password" name="confirmPassword" required minlength="8" placeholder="Repeat new password" autocomplete="new-password" />
        </label>
        <button type="submit">Update password</button>
        <p id="reset-password-message" class="message"></p>
      </form>

      <p id="reset-error" class="message error" hidden></p>
      <p class="auth-link"><a href="/admin/login">Back to sign in</a></p>
    </section>
  </main>

  <script src="/reset-password.js"></script>
</body>
</html>
