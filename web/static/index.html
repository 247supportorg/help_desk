<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FactoryX Help Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="ambient"></div>
  <main class="shell">
    <header class="hero panel reveal">
      <div>
        <p class="eyebrow">FactoryX Internal Ops</p>
        <h1>Help Desk Ticket Center</h1>
        <p class="subtext">Resolve customer requests and technical issues through a focused ticket workflow.</p>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <section class="grid">
      <article class="panel reveal delay-1">
        <h2>Create Ticket</h2>
        <form id="create-ticket-form" class="stack">
          <label>
            Customer
            <input type="text" name="customer" required placeholder="Jane Carter" />
          </label>
          <label>
            Email
            <input type="email" name="email" required placeholder="jane@company.com" />
          </label>
          <label>
            Subject
            <input type="text" name="subject" required placeholder="VPN cannot connect" />
          </label>
          <label>
            Description
            <textarea name="description" required rows="4" placeholder="Describe the issue and error message."></textarea>
          </label>
          <label>
            Priority
            <select name="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </label>
          <button type="submit">Submit Ticket</button>
          <p id="create-message" class="message"></p>
        </form>
      </article>

      <article class="panel reveal delay-2">
        <div class="row">
          <h2>Ticket Board</h2>
          <label class="visually-hidden" for="status-filter">Filter tickets by status</label>
          <select id="status-filter" title="Filter tickets by status">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div id="tickets" class="tickets"></div>
      </article>
    </section>

    <section class="panel reveal delay-3">
      <h2>Update Ticket</h2>
      <form id="update-ticket-form" class="split">
        <label>
          Ticket ID
          <input type="number" name="ticketId" min="1" required placeholder="1" />
        </label>
        <label>
          Assignee
          <input type="text" name="assignee" placeholder="Support Agent" />
        </label>
        <label>
          Status
          <select name="status">
            <option value="">No change</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
        </label>
        <label>
          Resolution Notes
          <input type="text" name="resolution" placeholder="Root cause and fix summary" />
        </label>
        <button type="submit">Apply Update</button>
        <p id="update-message" class="message"></p>
      </form>

      <hr />

      <h3>Add Comment</h3>
      <form id="comment-form" class="split">
        <label>
          Ticket ID
          <input type="number" name="ticketId" min="1" required placeholder="1" />
        </label>
        <label>
          Author
          <input type="text" name="author" required placeholder="NOC Team" />
        </label>
        <label class="wide">
          Message
          <input type="text" name="message" required placeholder="Investigating logs and firewall policies" />
        </label>
        <label class="inline">
          <input type="checkbox" name="internal" /> Internal note
        </label>
        <button type="submit">Post Comment</button>
        <p id="comment-message" class="message"></p>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
